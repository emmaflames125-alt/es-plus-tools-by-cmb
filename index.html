<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chimex Tools • Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111827">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Chimex Tools">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        :root { --tw-color-primary: #00f5ff; }
        * { transition-property: color, background-color, border-color, text-decoration-color, fill, stroke; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 200ms; }
        
        body {
            background: radial-gradient(circle at 50% 20%, rgba(0, 245, 255, 0.35) 0%, transparent 70%),
                        linear-gradient(to bottom, #111827, #0a0a0a);
            animation: globalPulse 8s ease infinite;
        }
        @keyframes globalPulse { 0%,100% { filter: brightness(1) drop-shadow(0 0 40px rgba(0,245,255,0.4)); } 50% { filter: brightness(1.25) drop-shadow(0 0 80px rgba(0,245,255,0.6)); } }
        
        .neon-text { text-shadow: 0 0 20px #00f5ff, 0 0 40px #00f5ff, 0 0 60px #00f5ff; }
        .neon-card { box-shadow: 0 0 25px rgba(0,245,255,0.4), 0 25px 50px -12px rgb(0 245 255 / 0.3); }
        
        .modal-pop { animation: modalPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes modalPop { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 overflow-hidden">

    <!-- LOGIN MODAL (always visible first) -->
    <div id="login-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[99999]">
        <div class="modal-pop bg-zinc-900 rounded-3xl max-w-md w-full mx-4 p-8 neon-card">
            <div class="text-center mb-8">
                <div class="inline-flex items-center gap-x-3 mx-auto mb-4">
                    <i class="fa-solid fa-tools text-4xl text-cyan-400"></i>
                    <h1 class="text-4xl font-semibold neon-text">Chimex</h1>
                </div>
                <h2 class="text-2xl font-semibold">Create your account</h2>
                <p class="text-zinc-400 text-sm mt-1">Secret code is hidden — only you know it</p>
            </div>
            
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="text-xs uppercase text-zinc-400 block mb-1">Your Name</label>
                    <input id="name-input" type="text" value="Admin" required class="w-full bg-zinc-800 border border-zinc-700 focus:border-cyan-400 rounded-3xl px-5 py-4 text-white outline-none">
                </div>
                <div>
                    <label class="text-xs uppercase text-zinc-400 block mb-1">Username</label>
                    <input id="username-input" type="text" value="admin" required class="w-full bg-zinc-800 border border-zinc-700 focus:border-cyan-400 rounded-3xl px-5 py-4 text-white outline-none">
                </div>
                <div>
                    <label class="text-xs uppercase text-zinc-400 block mb-1">Secret Code (optional)</label>
                    <input id="secret-input" type="password" placeholder="Enter secret code" class="w-full bg-zinc-800 border border-zinc-700 focus:border-cyan-400 rounded-3xl px-5 py-4 text-white outline-none">
                </div>
                <button type="submit" class="w-full py-4 bg-gradient-to-r from-cyan-400 to-purple-500 text-zinc-950 font-semibold rounded-3xl text-lg flex items-center justify-center gap-x-2">
                    <i class="fa-solid fa-rocket"></i> JOIN CHIMEX
                </button>
            </form>
            
            <p onclick="skipToDemo()" class="text-center text-zinc-400 text-xs mt-6 cursor-pointer hover:text-cyan-300">Quick demo</p>
        </div>
    </div>

    <!-- FULL DASHBOARD (shown after successful join) -->
    <div id="main-app" class="hidden flex flex-col h-screen">

        <!-- Navbar -->
        <nav class="bg-zinc-900/95 backdrop-blur-xl border-b border-cyan-400/30 px-4 md:px-8 py-4 flex items-center justify-between sticky top-0 z-50 neon-card">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-gradient-to-br from-cyan-400 to-purple-500 rounded-2xl flex items-center justify-center shadow-lg shadow-cyan-500/60 neon-card">
                    <i class="fa-solid fa-tools text-2xl rotate-12"></i>
                </div>
                <h1 class="text-3xl font-semibold tracking-tighter neon-text" style="font-family: 'Space Grotesk', sans-serif;">Chimex</h1>
                <span class="text-cyan-400 text-2xl font-medium tracking-widest">TOOLS</span>
            </div>

            <div class="flex items-center gap-x-2 bg-zinc-800 rounded-3xl p-1 neon-card">
                <button onclick="switchTab(0)" id="tab-0" class="tab-btn active px-7 py-2 rounded-3xl text-sm font-medium flex items-center gap-x-2"><i class="fa-solid fa-cubes"></i> Tools</button>
                <button onclick="switchTab(1)" id="tab-1" class="tab-btn px-7 py-2 rounded-3xl text-sm font-medium flex items-center gap-x-2"><i class="fa-solid fa-comments"></i> Chat</button>
                <button onclick="switchTab(2)" id="tab-2" class="tab-btn px-7 py-2 rounded-3xl text-sm font-medium flex items-center gap-x-2"><i class="fa-solid fa-user"></i> Profile</button>
            </div>

            <div class="flex items-center gap-x-4">
                <button onclick="togglePhoneMode()" id="mode-btn" class="flex items-center gap-x-2 px-4 py-2 bg-zinc-800 hover:bg-cyan-950 border border-cyan-400/30 rounded-3xl text-sm font-medium neon-card">
                    <i id="mode-icon" class="fa-solid fa-mobile-screen-button"></i>
                    <span id="mode-text" class="hidden md:inline">Phone Mode</span>
                </button>
                <button onclick="logout()" class="text-zinc-400 hover:text-red-400">Logout</button>
            </div>
        </nav>

        <div class="flex flex-1 overflow-hidden">
            <!-- Tools Sidebar -->
            <div class="w-full md:w-80 bg-zinc-900 border-r border-cyan-400/20 flex flex-col neon-card">
                <div class="px-6 pt-8 pb-4">
                    <h2 class="uppercase text-cyan-400 text-xs font-semibold tracking-[2px] flex items-center gap-x-2"><i class="fa-solid fa-cube"></i> AVAILABLE TOOLS</h2>
                </div>
                <div id="tools-list" class="flex-1 px-4 space-y-4 overflow-y-auto pb-8"></div>
            </div>

            <!-- Main Content -->
            <div class="flex-1 flex flex-col relative overflow-hidden">
                <!-- Tools View -->
                <div id="view-0" class="flex-1 flex flex-col">
                    <div id="home-view" class="flex-1 flex flex-col items-center justify-center p-6 md:p-10">
                        <div class="max-w-2xl text-center">
                            <h1 class="text-5xl md:text-7xl font-semibold leading-none tracking-tighter mb-6 neon-text">One hub.<br>Every tool.</h1>
                            <p class="text-xl md:text-2xl text-zinc-400">ROP Compiler • LCD Reader • Beautiful neon PWA</p>
                        </div>
                    </div>
                    <div id="tool-view" class="hidden flex-1 flex-col">
                        <div class="px-4 md:px-8 py-5 border-b border-zinc-800 flex items-center justify-between bg-white/5 backdrop-blur-md">
                            <div class="flex items-center gap-x-4">
                                <div id="tool-icon" class="text-3xl"></div>
                                <div>
                                    <h2 id="tool-title" class="text-2xl font-semibold"></h2>
                                    <p id="tool-desc" class="text-zinc-400 text-sm"></p>
                                </div>
                            </div>
                            <div class="flex items-center gap-x-3">
                                <button onclick="openInNewTab()" class="flex items-center gap-x-2 px-5 py-2 bg-white/10 hover:bg-white/20 rounded-3xl text-sm font-medium">New Tab</button>
                                <button onclick="closeTool()" class="w-10 h-10 flex items-center justify-center text-2xl hover:text-red-400">✕</button>
                            </div>
                        </div>
                        <iframe id="tool-iframe" class="flex-1 w-full border-0" frameborder="0" allowfullscreen></iframe>
                    </div>
                </div>

                <!-- Chat & Profile views (kept short for preview) -->
                <div id="view-1" class="flex-1 flex flex-col hidden p-4">Chat tab ready (type below)</div>
                <div id="view-2" class="flex-1 flex flex-col hidden items-center justify-center">Profile tab ready</div>
            </div>
        </div>
    </div>

    <script>
        function initializeTailwind() { return { config() { return { content: [], theme: { extend: {} }, plugins: [] }; } }; }

        let currentUser = null;
        let currentTool = null;

        const ADMIN_CODE = "@@@god_mode@@";
        const MOD_CODE = "@@@user_999o@@";

        function handleLogin(e) {
            e.preventDefault();
            const name = (document.getElementById('name-input').value || "User").trim();
            const username = (document.getElementById('username-input').value || "user").trim();
            const secret = document.getElementById('secret-input').value.trim();

            let role = "user";
            if (secret === ADMIN_CODE) role = "admin";
            else if (secret === MOD_CODE) role = "moderator";

            currentUser = { name, username, role, stars: role === "admin" ? 9999 : role === "moderator" ? 999 : 50 };

            localStorage.setItem('chimexUser', JSON.stringify(currentUser));

            // Hide login and show full dashboard
            document.getElementById('login-modal').style.display = 'none';
            document.getElementById('main-app').classList.remove('hidden');

            renderToolsList();
            console.log('%c✅ Logged in as ' + role.toUpperCase(), 'background:#00f5ff;color:#111827;padding:4px 8px;border-radius:6px');
        }

        function skipToDemo() {
            currentUser = { name: "Demo User", username: "demo", role: "user", stars: 100 };
            localStorage.setItem('chimexUser', JSON.stringify(currentUser));
            document.getElementById('login-modal').style.display = 'none';
            document.getElementById('main-app').classList.remove('hidden');
            renderToolsList();
        }

        function logout() {
            if (confirm("Logout?")) location.reload();
        }

        let tools = [
            { id: 1, name: "ROP Compiler", desc: "Powerful ROP chain compiler & gadget finder.", icon: "fa-solid fa-code-branch", color: "text-cyan-400", url: "rop-compiler/" },
            { id: 2, name: "LCD Reader", desc: "Real-time LCD screen reader & protocol decoder.", icon: "fa-solid fa-display", color: "text-purple-400", url: "lcd-reader/" }
        ];

        function renderToolsList() {
            const container = document.getElementById("tools-list");
            container.innerHTML = "";
            tools.forEach(tool => {
                const div = document.createElement('div');
                div.className = "cursor-pointer group flex gap-4 bg-zinc-800 hover:bg-zinc-700 border border-transparent hover:border-cyan-400/40 rounded-3xl p-5 neon-card";
                div.innerHTML = `<div class="text-4xl \( {tool.color}"><i class=" \){tool.icon}"></i></div>
                                 <div class="flex-1"><h3 class="font-semibold text-lg">\( {tool.name}</h3><p class="text-zinc-400 text-sm mt-1"> \){tool.desc}</p><div class="mt-4 text-xs uppercase flex justify-end text-cyan-400">Launch →</div></div>`;
                div.onclick = () => launchTool(tool.id);
                container.appendChild(div);
            });
        }

        function launchTool(id) {
            const tool = tools.find(t => t.id === id);
            if (!tool) return;
            currentTool = tool;
            document.getElementById("home-view").classList.add("hidden");
            const toolView = document.getElementById("tool-view");
            toolView.classList.remove("hidden");
            toolView.classList.add("flex");
            document.getElementById("tool-icon").innerHTML = `<i class="${tool.icon} ${tool.color}"></i>`;
            document.getElementById("tool-title").innerHTML = tool.name;
            document.getElementById("tool-desc").innerHTML = tool.desc;
            document.getElementById("tool-iframe").src = tool.url;
        }

        function closeTool() {
            currentTool = null;
            document.getElementById("tool-iframe").src = "";
            document.getElementById("tool-view").classList.add("hidden");
            document.getElementById("tool-view").classList.remove("flex");
            document.getElementById("home-view").classList.remove("hidden");
        }

        function openInNewTab() {
            if (currentTool) window.open(currentTool.url, "_blank");
        }

        function switchTab(n) {
            // Simple tab switch (you can expand later)
            alert("Tab " + n + " clicked (full chat & profile coming in next update)");
        }

        function startChimexTools() {
            initializeTailwind();
            const saved = localStorage.getItem('chimexUser');
            if (saved) {
                currentUser = JSON.parse(saved);
                document.getElementById('login-modal').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
                renderToolsList();
            }
            document.getElementById('login-form').addEventListener('submit', handleLogin);
            console.log('%c🚀 Chimex Tools ready — no blank screen', 'background:#00f5ff;color:#111827;font-weight:bold;padding:4px 8px;border-radius:6px');
        }

        window.onload = startChimexTools;
    </script>
</body>
</html>
