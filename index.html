<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chimex Tools • Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- PWA Manifest & Icons (you already have these files) -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111827">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Chimex Tools">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        :root { --tw-color-primary: #00f5ff; }
        
        * { transition-property: color, background-color, border-color, text-decoration-color, fill, stroke; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 200ms; }
        
        /* GLOBAL NEON GLOW + PULSE */
        body {
            background: radial-gradient(circle at 50% 30%, rgba(0, 245, 255, 0.25) 0%, transparent 60%),
                        linear-gradient(to bottom, #111827, #0a0a0a);
            animation: globalPulse 12s ease infinite;
        }
        
        @keyframes globalPulse {
            0%, 100% { filter: brightness(1) drop-shadow(0 0 30px rgba(0, 245, 255, 0.3)); }
            50% { filter: brightness(1.15) drop-shadow(0 0 60px rgba(0, 245, 255, 0.5)); }
        }
        
        .neon-text { text-shadow: 0 0 15px #00f5ff, 0 0 30px #00f5ff; }
        .neon-border { box-shadow: 0 0 25px #00f5ff, 0 0 50px rgba(0, 245, 255, 0.4); }
        .neon-card { box-shadow: 0 0 20px rgba(0, 245, 255, 0.3), 0 25px 50px -12px rgb(0 245 255 / 0.2); }
        
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        @keyframes glow { 0%, 100% { text-shadow: 0 0 10px #00f5ff; } 50% { text-shadow: 0 0 40px #00f5ff, 0 0 60px #00f5ff; } }
        
        .hero-text { animation: glow 2.5s ease-in-out infinite; }
        
        .card-hover:hover { transform: translateY(-6px) scale(1.04); box-shadow: 0 0 40px #00f5ff; }
        
        /* Mobile drawer animation */
        #mobile-drawer { animation: slideIn 0.4s cubic-bezier(0.32, 0.72, 0, 1); }
        @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
        
        /* Phone simulation mode */
        .phone-mode {
            max-width: 420px !important;
            margin: 40px auto !important;
            border: 14px solid #111827;
            border-radius: 48px;
            box-shadow: 0 0 80px 30px rgba(0, 245, 255, 0.6),
                        0 0 120px 40px rgba(168, 85, 247, 0.3);
            height: calc(100vh - 80px) !important;
            overflow: hidden;
            position: relative;
        }
        .phone-mode::before {
            content: '';
            position: absolute;
            top: 12px; left: 50%;
            width: 140px; height: 28px;
            background: #111827;
            border-radius: 30px;
            transform: translateX(-50%);
            z-index: 10;
        }
        
        /* Ad banner glow */
        .ad-glow { animation: adPulse 4s ease infinite; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 overflow-hidden">
    <!-- Top Navbar (now fully responsive + mode switch) -->
    <nav class="bg-zinc-900/95 backdrop-blur-xl border-b border-cyan-400/30 px-4 md:px-8 py-4 flex items-center justify-between sticky top-0 z-50 neon-border">
        
        <!-- Left: Logo + Hamburger (mobile only) -->
        <div class="flex items-center gap-x-3">
            <button onclick="toggleMobileDrawer()" 
                    class="md:hidden text-3xl text-cyan-400 hover:text-white">
                <i class="fa-solid fa-bars"></i>
            </button>
            
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-gradient-to-br from-cyan-400 to-purple-500 rounded-2xl flex items-center justify-center shadow-lg shadow-cyan-500/60">
                    <i class="fa-solid fa-tools text-2xl rotate-12"></i>
                </div>
                <h1 class="text-3xl font-semibold tracking-tighter neon-text" style="font-family: 'Space Grotesk', sans-serif;">
                    Chimex
                </h1>
                <span class="text-cyan-400 text-2xl font-medium tracking-widest">TOOLS</span>
            </div>
        </div>

        <!-- Center nav pills -->
        <div class="flex items-center gap-x-2 bg-zinc-800 rounded-3xl p-1">
            <button onclick="navigateTo('home')" id="nav-home"
                    class="nav-btn active px-6 py-2 rounded-3xl text-sm font-medium flex items-center gap-x-2">
                <i class="fa-solid fa-house"></i><span class="hidden sm:inline">Home</span>
            </button>
            <button onclick="navigateTo('tools')" id="nav-tools"
                    class="nav-btn px-6 py-2 rounded-3xl text-sm font-medium flex items-center gap-x-2">
                <i class="fa-solid fa-cubes"></i><span class="hidden sm:inline">Tools</span>
            </button>
        </div>

        <!-- Right side -->
        <div class="flex items-center gap-x-4">
            
            <!-- PHONE / DESKTOP MODE SWITCH -->
            <button onclick="togglePhoneMode()" 
                    id="mode-btn"
                    class="flex items-center gap-x-2 px-4 py-2 bg-zinc-800 hover:bg-cyan-950 border border-cyan-400/30 rounded-3xl text-sm font-medium">
                <i id="mode-icon" class="fa-solid fa-mobile-screen-button"></i>
                <span id="mode-text" class="hidden md:inline">Phone Mode</span>
            </button>

            <!-- PWA Install Button (from previous) -->
            <button onclick="installPWA()" 
                    class="flex items-center gap-x-2 px-5 py-2 bg-gradient-to-r from-cyan-400 to-purple-500 hover:from-cyan-300 hover:to-purple-400 text-zinc-950 font-semibold rounded-3xl text-sm shadow-lg shadow-cyan-500/40">
                <i class="fa-solid fa-download"></i>
                <span class="hidden sm:inline">Install App</span>
            </button>

            <!-- Status -->
            <div class="hidden md:flex items-center gap-x-2 text-emerald-400 text-sm">
                <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                ONLINE
            </div>
        </div>
    </nav>

    <div class="flex h-[calc(100vh-73px)] flex-col md:flex-row relative">
        
        <!-- SIDEBAR (Desktop only) -->
        <div id="desktop-sidebar" class="hidden md:flex w-80 bg-zinc-900 border-r border-cyan-400/20 flex-col neon-card">
            <div class="px-6 pt-8 pb-4">
                <h2 class="uppercase text-cyan-400 text-xs font-semibold tracking-[2px] flex items-center gap-x-2">
                    <i class="fa-solid fa-cube"></i> AVAILABLE TOOLS
                </h2>
            </div>
            <div id="tools-list" class="flex-1 px-4 space-y-3 overflow-y-auto"></div>
            
            <!-- Sidebar footer -->
            <div class="p-6 border-t border-zinc-800 text-xs text-zinc-500 flex items-center justify-between">
                <div>Ready for mobile &amp; desktop</div>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="flex-1 flex flex-col bg-grid relative overflow-hidden">
            
            <!-- HOME VIEW -->
            <div id="home-view" class="flex-1 flex flex-col items-center justify-center p-6 md:p-10">
                <div class="max-w-2xl text-center">
                    <div class="inline-flex items-center gap-x-3 bg-zinc-900/80 border border-cyan-400/30 text-cyan-400 text-sm px-6 py-3 rounded-3xl mb-8 neon-border">
                        <i class="fa-solid fa-rocket animate-bounce"></i>
                        NOW MOBILE + PWA READY
                        <i class="fa-solid fa-rocket animate-bounce" style="animation-delay:300ms"></i>
                    </div>
                    
                    <h1 class="text-5xl md:text-7xl font-semibold leading-none tracking-tighter mb-6 neon-text" style="font-family: 'Space Grotesk', sans-serif;">
                        One hub.<br>Every tool.<br><span class="text-cyan-400">On your phone.</span>
                    </h1>
                    
                    <p class="text-xl md:text-2xl text-zinc-400 mb-10">Beautiful glowing dashboard • ROP Compiler • LCD Reader • Fully installable PWA</p>
                    
                    <div onclick="navigateTo('tools')" class="cursor-pointer inline-flex items-center gap-x-3 bg-gradient-to-r from-cyan-400 to-purple-500 text-zinc-950 px-8 py-4 rounded-3xl text-lg font-semibold shadow-2xl shadow-cyan-500/50">
                        Launch Tools <i class="fa-solid fa-arrow-right ml-2"></i>
                    </div>
                </div>
            </div>

            <!-- TOOL VIEW (iframe) -->
            <div id="tool-view" class="hidden flex-1 flex-col">
                <div class="px-4 md:px-8 py-5 border-b border-zinc-800 flex items-center justify-between bg-white/5 backdrop-blur-md">
                    <div class="flex items-center gap-x-4">
                        <div id="tool-icon" class="text-3xl"></div>
                        <div>
                            <h2 id="tool-title" class="text-2xl font-semibold"></h2>
                            <p id="tool-desc" class="text-zinc-400 text-sm"></p>
                        </div>
                    </div>
                    <div class="flex items-center gap-x-3">
                        <button onclick="openInNewTab()" class="flex items-center gap-x-2 px-5 py-2 bg-white/10 hover:bg-white/20 rounded-3xl text-sm font-medium">
                            <i class="fa-solid fa-arrow-up-right-from-square"></i> New Tab
                        </button>
                        <button onclick="closeTool()" class="w-10 h-10 flex items-center justify-center text-2xl hover:text-red-400">✕</button>
                    </div>
                </div>
                <iframe id="tool-iframe" class="flex-1 w-full border-0" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <!-- MOBILE DRAWER (slide-in sidebar for phones) -->
    <div onclick="if(event.target.id === 'mobile-drawer') toggleMobileDrawer()" 
         id="mobile-drawer"
         class="hidden fixed inset-0 bg-black/70 z-[9999] md:hidden">
        <div onclick="event.stopImmediatePropagation()" 
             class="w-80 h-full bg-zinc-900 shadow-2xl flex flex-col">
            <div class="p-6 border-b border-cyan-400/30 flex justify-between items-center">
                <h2 class="text-xl font-semibold neon-text">Chimex Tools</h2>
                <button onclick="toggleMobileDrawer()" class="text-3xl text-cyan-400">✕</button>
            </div>
            <div id="drawer-tools-list" class="flex-1 px-4 py-6 space-y-3 overflow-y-auto"></div>
        </div>
    </div>

    <!-- GLOWING FLOATING AD BANNER (always visible, closable) -->
    <div id="ad-banner" 
         class="fixed bottom-6 left-1/2 -translate-x-1/2 md:left-auto md:right-8 z-[100] bg-gradient-to-r from-purple-600/90 to-cyan-500/90 text-white px-6 py-4 rounded-3xl flex items-center gap-x-4 shadow-2xl neon-card ad-glow max-w-[340px] md:max-w-sm">
        <div class="px-3 py-1 text-[10px] font-bold bg-white/20 rounded-2xl tracking-widest">AD</div>
        <div class="text-sm font-medium">
            Want even more tools?<br>
            <span class="opacity-90">Check Chimex Pro — unlimited gadgets</span>
        </div>
        <button onclick="document.getElementById('ad-banner').style.display='none'" 
                class="ml-auto text-white/70 hover:text-white text-2xl leading-none">×</button>
    </div>

    <script>
        // === TAILWIND INIT ===
        function initializeTailwind() {
            return { config(userConfig = {}) { return { content: [], theme: { extend: {} }, plugins: [], ...userConfig }; }, theme: { extend: {} } };
        }

        // === YOUR TOOLS (edit URLs here - same as before) ===
        let tools = [
            {
                id: 1,
                name: "ROP Compiler",
                desc: "Powerful ROP chain compiler & gadget finder. Ideal for exploit development.",
                icon: "fa-solid fa-code-branch",
                color: "text-cyan-400",
                url: "rop-compiler/"        // ← your folder or full URL
            },
            {
                id: 2,
                name: "LCD Reader",
                desc: "Real-time LCD screen reader & protocol decoder for embedded devices.",
                icon: "fa-solid fa-display",
                color: "text-purple-400",
                url: "lcd-reader/"          // ← your folder or full URL
            }
        ];

        let currentTool = null;
        let phoneMode = false;

        // Render tools into both sidebar and mobile drawer
        function renderToolsList() {
            const containers = [
                document.getElementById("tools-list"),
                document.getElementById("drawer-tools-list")
            ];
            
            containers.forEach(container => {
                if (!container) return;
                container.innerHTML = "";
                
                tools.forEach(tool => {
                    const itemHTML = `
                    <div onclick="launchTool(${tool.id}); ${container.id === 'drawer-tools-list' ? 'toggleMobileDrawer()' : ''}" 
                         class="cursor-pointer group flex gap-4 bg-zinc-800 hover:bg-zinc-700 border border-transparent hover:border-cyan-400/40 rounded-3xl p-5 neon-card">
                        <div class="text-4xl \( {tool.color}"><i class=" \){tool.icon}"></i></div>
                        <div class="flex-1">
                            <h3 class="font-semibold text-lg">${tool.name}</h3>
                            <p class="text-zinc-400 text-sm line-clamp-3 mt-1">${tool.desc}</p>
                            <div class="mt-4 text-xs uppercase flex justify-end text-cyan-400">Launch →</div>
                        </div>
                    </div>`;
                    container.innerHTML += itemHTML;
                });
            });
        }

        function launchTool(id) {
            const tool = tools.find(t => t.id === id);
            if (!tool) return;
            currentTool = tool;

            document.getElementById("home-view").classList.add("hidden");
            const toolView = document.getElementById("tool-view");
            toolView.classList.remove("hidden");
            toolView.classList.add("flex");

            document.getElementById("tool-icon").innerHTML = `<i class="${tool.icon} ${tool.color}"></i>`;
            document.getElementById("tool-title").innerHTML = tool.name;
            document.getElementById("tool-desc").innerHTML = tool.desc;

            document.getElementById("tool-iframe").src = tool.url;
            navigateTo('tools');
        }

        function closeTool() {
            currentTool = null;
            document.getElementById("tool-iframe").src = "";
            document.getElementById("tool-view").classList.add("hidden");
            document.getElementById("tool-view").classList.remove("flex");
            document.getElementById("home-view").classList.remove("hidden");
            navigateTo('home');
        }

        function openInNewTab() {
            if (currentTool) window.open(currentTool.url, "_blank");
        }

        function navigateTo(page) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active', 'bg-zinc-700', 'text-white'));
            if (page === 'home') document.getElementById('nav-home').classList.add('active', 'bg-zinc-700', 'text-white');
            if (page === 'tools') document.getElementById('nav-tools').classList.add('active', 'bg-zinc-700', 'text-white');
        }

        // === MOBILE DRAWER ===
        function toggleMobileDrawer() {
            const drawer = document.getElementById("mobile-drawer");
            drawer.classList.toggle("hidden");
            if (!drawer.classList.contains("hidden")) drawer.style.display = "flex";
        }

        // === PHONE MODE TOGGLE (for desktop preview) ===
        function togglePhoneMode() {
            phoneMode = !phoneMode;
            const body = document.body;
            const btn = document.getElementById("mode-btn");
            const icon = document.getElementById("mode-icon");
            const text = document.getElementById("mode-text");

            if (phoneMode) {
                body.classList.add("phone-mode");
                icon.classList.replace("fa-mobile-screen-button", "fa-desktop");
                text.textContent = "Desktop Mode";
            } else {
                body.classList.remove("phone-mode");
                icon.classList.replace("fa-desktop", "fa-mobile-screen-button");
                text.textContent = "Phone Mode";
            }
        }

        // === PWA (from previous version - kept intact) ===
        let deferredPrompt = null;

        function registerPWA() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(() => console.log('%c✅ PWA Service Worker ready – works offline on phone!', 'background:#00f5ff;color:#000;padding:2px 6px;border-radius:4px'));
            }
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
            } else if (/iPad|iPhone|iPod/.test(navigator.userAgent)) {
                alert("📱 On iOS: Tap Share → Add to Home Screen");
            } else {
                alert("📲 Tap the install icon in your browser’s address bar");
            }
        }

        // === START EVERYTHING ===
        function startChimexTools() {
            initializeTailwind();
            renderToolsList();
            registerPWA();

            console.log('%c🚀 Chimex Tools – Now glowing + fully mobile + PWA + ads!', 'background:#00f5ff;color:#111827;font-weight:bold;padding:4px 8px;border-radius:6px');
            
            // Keyboard shortcut
            document.addEventListener('keydown', e => {
                if (e.key === "/" && !document.getElementById("home-view").classList.contains("hidden")) {
                    e.preventDefault();
                    navigateTo('tools');
                }
            });
        }

        window.onload = startChimexTools;
    </script>
</body>
</html>
