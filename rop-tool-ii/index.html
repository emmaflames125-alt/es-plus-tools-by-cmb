<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Compiler PWA</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: #e2e8f0;
}

header {
    padding: 15px;
    text-align: center;
    font-weight: bold;
    background: linear-gradient(90deg, #1e293b, #0f172a);
}

.container {
    display: flex;
    height: calc(100vh - 60px);
}

.left, .right {
    width: 50%;
    padding: 10px;
    display: flex;
    flex-direction: column;
}

textarea {
    flex: 1;
    background: #020617;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 10px;
}

pre {
    flex: 1;
    background: #020617;
    padding: 10px;
    border-radius: 10px;
    overflow: auto;
    white-space: pre-wrap;
}

/* buttons */
button {
    padding: 10px;
    margin: 5px;
    background: #3b82f6;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

/* debug highlight animation */
.highlight {
    background: rgba(59,130,246,0.3);
    transition: background 0.3s ease;
}

/* error box */
.error {
    color: #f87171;
    font-weight: bold;
}
</style>
</head>

<body>

<header>⚙️ Rop Compiler Type II </header>

<div class="container">

<div class="left">

<textarea id="compilerInput"></textarea>

<div>
    <button onclick="runCompiler()">Compile</button>
    <button onclick="clearAll()">Clear</button>
    <button onclick="remakeFromOutput()">Remake Hackstring</button>
</div>

<div>
    <button onclick="startDebug()">Start Debug</button>
    <button onclick="prevStep()">◀</button>
    <button onclick="nextStep()">▶</button>
    <button onclick="runAnimated()">▶▶ Animate</button>
</div>

</div>

<div class="right">

<pre id="compilerOutput">Output...</pre>

<div id="debugInfo">Debug: Idle</div>

</div>

</div>

<script src="file_utils.js"></script>
<script src="constants.js"></script>
<script src="rop.js"></script>
<script src="compiler.js"></script>
<script src="rmk.js"></script>

<script>

/* =======================
   SAFE OUTPUT HANDLER
======================= */
function safeOutput(text) {
    const el = document.getElementById("compilerOutput");
    el.innerHTML = text;
}

/* =======================
   ERROR HANDLER
======================= */
function handleError(err) {
    const el = document.getElementById("compilerOutput");

    let msg = err?.message || "Unknown error";
    el.innerHTML = `<div class="error">❌ ${msg}</div>`;

    console.error(err);
}

/* =======================
   CLEAR
======================= */
function clearAll() {
    document.getElementById("compilerInput").value = "";
    safeOutput("");
}

/* =======================
   LIVE COMPILER
======================= */
let debounceTimer;

document.getElementById("compilerInput")
.addEventListener("input", () => {
    clearTimeout(debounceTimer);

    debounceTimer = setTimeout(() => {
        try {
            runCompiler();
        } catch (e) {
            handleError(e);
        }
    }, 400);
});

/* =======================
   DEBUG STATE
======================= */
let debugLines = [];
let currentStep = 0;
let isAnimating = false;

/* =======================
   START DEBUG
======================= */
function startDebug() {
    try {
        let input = document.getElementById("compilerInput").value;

        debugLines = input.split("\n").map(l => l.trim());
        currentStep = 0;

        document.getElementById("debugInfo").textContent =
            `Step ${currentStep + 1} / ${debugLines.length}`;

        showStep();
    } catch (e) {
        handleError(e);
    }
}

/* =======================
   SHOW STEP
======================= */
function showStep() {
    try {
        let line = debugLines[currentStep];

        let temp = debugLines.slice(0, currentStep + 1);

        let tokens = process_rop(temp);

        safeOutput(
            `🔍 Step ${currentStep + 1}\n` +
            `Line: ${line}\n\n` +
            print_tokens(tokens)
        );

        document.getElementById("debugInfo").textContent =
            `Step ${currentStep + 1} / ${debugLines.length}`;

    } catch (e) {
        handleError(e);
    }
}

/* =======================
   NEXT STEP
======================= */
function nextStep() {
    if (currentStep < debugLines.length - 1) {
        currentStep++;
        showStep();
    }
}

/* =======================
   PREV STEP
======================= */
function prevStep() {
    if (currentStep > 0) {
        currentStep--;
        showStep();
    }
}

/* =======================
   ANIMATED EXECUTION
======================= */
async function runAnimated() {
    try {
        isAnimating = true;
        startDebug();

        for (; currentStep < debugLines.length; currentStep++) {

            if (!isAnimating) break;

            showStep();

            await new Promise(r => setTimeout(r, 500)); // animation speed
        }

        isAnimating = false;

    } catch (e) {
        handleError(e);
    }
}

/* stop animation if needed */
function stopAnimation() {
    isAnimating = false;
}

/*remake the file*/
function remakeFromOutput() {
    try {
        const outputText = document.getElementById("compilerOutput").textContent;

        // extract tokens (split by space)
        let tokens = outputText.split(/\s+/);

        let result = remakeHackstring(tokens, "hackstring.hs");

        // display messages + result
        let finalText = "";

        result.messages.forEach(msg => {
            finalText += msg + "\n";
        });

        finalText += "\n👽 Remade Hackstring:\n\n";
        finalText += result.hackstring + "\n\n";

        finalText += `Developer: ${result.developer}`;

        document.getElementById("compilerOutput").textContent = finalText;

        // auto download
        saveHackstring(result.hackstring, "hackstring.hs");

    } catch (e) {
        document.getElementById("compilerOutput").textContent =
            "❌ Remake Error:\n" + e.message;
    }
}

</script>

<script>
/* =======================
   SERVICE WORKER (PWA)
======================= */
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js")
    .catch(err => console.error("SW failed", err));
}
</script>

</body>
</html>
